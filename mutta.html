<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutta - EBRU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .project-hero { padding: 12rem var(--padding-global) 4rem; }
        .project-hero-title { font-family: var(--font-heading); font-size: clamp(3rem, 10vw, 12rem); line-height: 0.9; text-transform: uppercase; margin-bottom: 2rem; }
        .project-details { display: grid; grid-template-columns: 1fr 3fr; gap: 4rem; margin-bottom: 4rem; padding: 0 var(--padding-global); }
        .roles { display: flex; flex-direction: column; gap: 1rem; }
        .roles p { color: var(--text-secondary); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.05em; }
        .roles h3 { font-size: 1rem; font-weight: 500; }
        .project-description { font-size: clamp(1.2rem, 2vw, 2rem); line-height: 1.5; color: var(--text-secondary); }
        .project-description strong { color: var(--text-primary); }
        .gallery { display: flex; flex-direction: column; gap: 1rem; }
        .gallery img { width: 100%; height: auto; display: block; }
        @media (max-width: 1024px) { .project-details { grid-template-columns: 1fr; } }
    </style>
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
</head>
<body class="dark-theme">
    <div class="film-grain"></div>
    <header class="site-header">
        <a href="index.html" class="logo">EBRU.</a>
                <div class="mobile-controls">
            <a href="#" id="lang-toggle" style="margin-right:1rem; font-weight:700; color:var(--accent);">EN</a>
            <button id="menu-toggle" class="hamburger-btn"><i data-lucide="menu"></i></button>
        </div>
        <nav id="main-nav">
            <a href="index.html#work" data-i18n="nav.work">Work</a><a href="https://wa.me/593958831259" target="_blank" class="btn-primary" data-i18n="nav.contact">Let's Talk</a></nav>
    </header>

    <main data-scroll-container>
        <section class="project-hero">
            <h1 class="project-hero-title">MUTTA</h1>
        </section>

        <section class="project-details">
            <div class="roles">
                <div><p data-i18n="project.client">Client</p><h3>Mutta</h3></div>
                <div><p data-i18n="project.services">Services</p><h3>Branding</h3></div>
            </div>
            <div class="project-description">
                <p data-i18n="mutta.desc"><strong>Redefinimos la arquitectura a través de la entropía.</strong> Creando edificios que son sistemas vivos en constante evolución, un sistema que realiza constantemente intercambios de energía y materia con su entorno.</p>
            </div>
        </section>

        <section class="gallery">
            <script>
                for(let i=1; i<=19; i++) {
                    document.write(`<img src="projects/Mutta/extracted-images/slide_${i.toString().padStart(2, '0')}.jpg" alt="Slide ${i}">`);
                }
            </script>
        </section>
    </main>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
